<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=devive-width, initial-scale=1.0">
    <title>Exercise 2</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Oxygen:wght@300;400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Space+Grotesk:wght@300..700&display=swap');

        .consulation {
            background-color: black;
            color: white;
            font-size: 15px;
            width: 220px;
            height: 55px;
            margin: 2px;
            border-radius: 8px;
            font-family: "Space Grotesk";
        }

        .request {
            color: black;
            font-size: 15px;
            width: 220px;
            height: 55px;
            margin: 2px;
            border-radius: 8px;
            border: 1px solid black;
            background-color: white;
            font-family: "Space Grotesk";
        }

        .bar {
            display: flex;
            width: 1440px;
            justify-content: center;
            gap: auto;
            padding: 30px;
            align-items: center;
        }

        .toplogo {
            padding-right: 430px;
            padding-left: 30px;
            align-items: left;
            width: auto;
            height: 40px;
        }

        .selection {
            display: flex;
            font-family: "Space Grotesk";
            justify-content: space-evenly;
            gap: 40px;
            align-items: center;
            width: 800px;
        }

        .header {
            display: flex;
            width: 1440px;
            height: 450px;
            justify-content: space-between;
            align-items: flex-start;
            padding: 60px;
            gap: auto;
        }

        .content {
            width: 600px;
            height: auto;
            gap: 35px;
            font-family: "Space Grotesk";
            align-items: top;
            padding-left: 20px;
        }

        .illustration {
            width: 600px;
            height: 500px;
            padding-right: 35px;
        }

        .logos {
            display: flex;
            justify-content: space-between;
            padding: 40px;
            width: 1370px;
            mix-blend-mode: luminosity;
        }

        .digital {
            font-size: 20px;
        }

        .nagivate {
            font-size: 60px;
        }
    </style>
</head>

<body>
    <div class="bar">
    </div>
    <img class="toplogo" src="images/positivus.png" height="30px">
    <div class="selection">
        <p>About us</p>
        <p>Services</p>
        <p>Use Cases</p>
        <p>Pricing</p>
        <p>Blog</p>
        <button class="request" type="button">Request a quote</button>
    </div>

    <div class="header">
        <div class="content">
            <h1 class="nagivate">Navigating the digital landscape for success</h1>
            <p class="digital">Our digital marketing agency helps businesses grow and succeed online though a range of
                services including SEO, PPC, social media marketing, and content creation.</p>
            <button class="consulation" type="button">Book a consulation</button>
        </div>
        <img class="Illustration" src="images/Illustration.png" width="500">
    </div>

    <div class="logos">
        <img src="images/amazon.png" width="100">
        <img src="images/dribbble.png" width="100">
        <img src="images/hubspot.png" width="100">
        <img src="images/notion.png" width="100">
        <img src="images/netfilx.png" width="100">
        <img src="images/zoom.png" width="100">

    </div>
</body>

</html>
