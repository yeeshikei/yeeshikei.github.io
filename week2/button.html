<DOCTYPE html>
    <html lang="en">

    <head>
        <style>
            button.class1 {
                background-color: #000000;
                border: none;
                color: rgb(255, 255, 255);
                padding: 17px 25px;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                font-size: 18px;
                margin: 4px 15px;
                cursor: pointer;
            }

            button.class2 {
                background-color: #55a35a;
                border: none;
                color: rgb(255, 255, 255);
                padding: 15px 35px;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                font-size: 18px;
                font-weight: bold;
                margin: 4px 15px;
                cursor: pointer;
                border-radius: 8px;
            }

            button.class3 {
                background-color: #f9da4e;
                border: none;
                color: rgb(0, 0, 0);
                padding: 15px 80px;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                font-size: 18px;
                font-weight: medium;
                margin: 4px 15px;
                cursor: pointer;
                border-radius: 30px;
            }

            button.class4 {
                background-color: #7354ad;
                border: none;
                color: rgb(255, 255, 255);
                padding: 15px 30px;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                font-size: 18px;
                font-weight: bold;
                margin: 4px 15px;
                cursor: pointer;
                border-radius: 6px;
            }

            button.class5 {
                background-color: #ffffff;
                border: #71767a 2px solid;
                color: #71767a;
                padding: 15px 25px;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                font-size: 16px;
                font-weight: bold;
                margin: 4px 15px;
                cursor: pointer;
                border-radius: 8px;
            }

            button.class6 {
                background-color: #2d65bc;
                border: none;
                color: #ffffff;
                padding: 13px 30px;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                font-size: 18px;
                font-weight: bold;
                margin: 4px 15px;
                cursor: pointer;
                border-radius: 30px;
            }

            button.class7 {
                background-color: #ffffff;
                border: #2d65bc 2px solid;
                color: #2d65bc;
                padding: 13px 25px;
                text-align: center;
                text-decoration: none;
                display: inline-block;
                font-size: 18px;
                font-weight: bold;
                margin: 4px 15px;
                cursor: pointer;
                border-radius: 30px;
            }
        </style>
    </head>

    <body>
        <button class="class1">Request now</button>
        <button class="class2">Sign up</button>
        <button class="class3">Add to Cart</button>
        <button class="class4">Get started</button>
        <button class="class5">Download</button>
        <button class="class6">Apply on company website</button>
        <button class="class7">Save</button>

    </body>

    </html>
